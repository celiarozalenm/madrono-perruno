<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef7ee"/>
      <stop offset="1" stop-color="#faf7f2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo izquierda -->
  <g transform="translate(80, 200)">
    <g transform="scale(3)">
      <!-- Tronco -->
      <rect x="58" y="46" width="8" height="32" rx="2" fill="#5a3f2a"/>
      <!-- Copa -->
      <g fill="#2a6f35">
        <circle cx="62" cy="28" r="16"/>
        <circle cx="76" cy="34" r="10"/>
        <circle cx="48" cy="34" r="10"/>
        <circle cx="68" cy="16" r="9"/>
        <circle cx="56" cy="18" r="9"/>
      </g>
      <!-- Frutos -->
      <g fill="#c8252b">
        <circle cx="56" cy="22" r="2.6"/>
        <circle cx="65" cy="28" r="2.6"/>
        <circle cx="48" cy="36" r="2.6"/>
        <circle cx="72" cy="26" r="2.6"/>
        <circle cx="60" cy="38" r="2.6"/>
        <circle cx="73" cy="14" r="2.4"/>
        <circle cx="52" cy="14" r="2.4"/>
        <circle cx="68" cy="40" r="2.4"/>
      </g>
      <!-- Perro -->
      <g fill="#d9641a">
        <path d="M 14 46 Q 6 42 10 30 Q 12 22 18 24 L 18 32 Q 14 38 18 44 Z"/>
        <ellipse cx="26" cy="56" rx="14" ry="20"/>
        <ellipse cx="20" cy="76" rx="8" ry="5"/>
        <ellipse cx="34" cy="30" rx="13" ry="12"/>
        <ellipse cx="46" cy="32" rx="7" ry="5"/>
        <path d="M 24 18 Q 18 16 18 26 Q 22 30 28 26 Z"/>
        <path d="M 36 48 Q 38 44 44 44 L 60 44 Q 64 44 64 48 L 64 56 Q 62 60 56 60 L 38 60 Q 34 56 36 48 Z"/>
      </g>
      <circle cx="51" cy="32" r="1.8" fill="#1a1a1a"/>
      <circle cx="38" cy="28" r="1.4" fill="#1a1a1a"/>
    </g>
  </g>

  <!-- Texto a la derecha -->
  <g transform="translate(440, 0)" font-family="'DM Sans', system-ui, sans-serif">
    <text x="0" y="220" font-size="38" fill="#d9641a" font-weight="800" letter-spacing="2">UN CLICK, UNA CIUDAD MEJOR</text>
    <text x="0" y="320" font-size="92" fill="#1a1a1a" font-weight="800" letter-spacing="-2">Madroño</text>
    <text x="0" y="410" font-size="92" fill="#2a6f35" font-weight="800" letter-spacing="-2">Perruno</text>
    <text x="0" y="470" font-size="32" fill="#4b5563" font-weight="500">Atlas Canino de Madrid</text>
    <text x="0" y="540" font-size="22" fill="#6b7280" font-weight="400">Reutilización de datos abiertos del Ayuntamiento de Madrid</text>
  </g>

  <!-- Esquina inferior: pill institucional -->
  <g transform="translate(80, 540)">
    <rect width="280" height="44" rx="22" fill="#1c4988"/>
    <circle cx="22" cy="22" r="6" fill="#fdecd6"/>
    <text x="38" y="29" font-family="'DM Sans', system-ui, sans-serif" font-size="16" fill="#ffffff" font-weight="600">Datos: Ayuntamiento de Madrid</text>
  </g>
</svg>
