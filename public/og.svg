<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!--
    OG image — composición editorial 1200×630 para compartir en redes.
    Mismo lenguaje que la nueva landing: cinta diagonal arriba/abajo,
    "N.º 01" como sello, gran título mixto (regular + itálica brand),
    skyline de Madrid silueteado y eyebrow tipográfico. Solo usa los
    tokens del proyecto: brand 100/500/700, madroño 500/700, verde 500,
    stone 50/300/600/900.
  -->

  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef7ee"/>
      <stop offset="0.55" stop-color="#fdecd6"/>
      <stop offset="1" stop-color="#fad6ad"/>
    </linearGradient>
    <pattern id="og-dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1c1917" fill-opacity="0.18"/>
    </pattern>
    <pattern id="og-tape" x="0" y="0" width="40" height="14" patternUnits="userSpaceOnUse">
      <rect width="40" height="14" fill="#1c1917"/>
      <path d="M-4 14 L14 -4 M16 14 L34 -4 M36 14 L54 -4"
            stroke="#fef7ee" stroke-width="3"/>
    </pattern>
  </defs>

  <!-- Fondo cream gradient -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>

  <!-- Halo solar brand -->
  <g>
    <circle cx="980" cy="310" r="220" fill="#ed731f" fill-opacity="0.10"/>
    <circle cx="980" cy="310" r="160" fill="#ed731f" fill-opacity="0.18"/>
    <circle cx="980" cy="310" r="100" fill="#ed731f" fill-opacity="0.95"/>
  </g>

  <!-- Trama de puntos sobre la mitad superior -->
  <rect width="1200" height="350" fill="url(#og-dots)" opacity="0.7"/>

  <!-- Cinta superior -->
  <rect x="0" y="0" width="1200" height="14" fill="url(#og-tape)"/>

  <!-- Cinta inferior -->
  <rect x="0" y="616" width="1200" height="14" fill="url(#og-tape)"/>

  <!-- Eyebrow -->
  <g transform="translate(72, 98)">
    <rect x="0" y="0" width="74" height="28" fill="#1c1917"/>
    <text x="37" y="20" font-family="DM Sans, system-ui, sans-serif"
          font-size="14" font-weight="800" letter-spacing="3"
          fill="#faf7f2" text-anchor="middle">N.º 01</text>
    <text x="92" y="20" font-family="DM Sans, system-ui, sans-serif"
          font-size="13" font-weight="700" letter-spacing="3"
          fill="#48321f">DATOS ABIERTOS · MADRID · PWA</text>
  </g>

  <!-- Título principal -->
  <g transform="translate(72, 200)" font-family="DM Sans, system-ui, sans-serif" fill="#1c1917">
    <text x="0" y="0" font-size="120" font-weight="900" letter-spacing="-4">Madroño</text>
    <text x="0" y="120" font-size="120" font-weight="900" letter-spacing="-4">Perruno</text>
    <text x="0" y="232" font-size="64" font-style="italic" font-weight="400"
          letter-spacing="-1" fill="#b84314">Atlas Canino de Madrid</text>
  </g>

  <!-- Skyline silueta abajo derecha -->
  <g transform="translate(620, 380)" fill="#48321f">
    <!-- Puerta de Alcalá abstracta -->
    <g transform="translate(0, 100)">
      <rect x="0" y="40" width="86" height="48"/>
      <path d="M0 40 H86 V18 Q43 -2 0 18 Z"/>
      <rect x="-4" y="38" width="94" height="6"/>
      <rect x="10" y="56" width="14" height="32" fill="#fdecd6" opacity="0.45"/>
      <rect x="36" y="56" width="14" height="32" fill="#fdecd6" opacity="0.45"/>
      <rect x="62" y="56" width="14" height="32" fill="#fdecd6" opacity="0.45"/>
    </g>
    <!-- Cibeles -->
    <g transform="translate(120, 80)">
      <rect x="0" y="60" width="84" height="68"/>
      <path d="M0 60 Q42 6 84 60 Z"/>
      <rect x="38" y="0" width="6" height="20"/>
      <circle cx="41" cy="0" r="4" fill="#ed731f"/>
      <rect x="10" y="80" width="12" height="48" fill="#fdecd6" opacity="0.5"/>
      <rect x="36" y="80" width="12" height="48" fill="#fdecd6" opacity="0.5"/>
      <rect x="62" y="80" width="12" height="48" fill="#fdecd6" opacity="0.5"/>
    </g>
    <!-- Tower with clock -->
    <g transform="translate(238, 50)">
      <rect x="0" y="20" width="44" height="158"/>
      <rect x="-4" y="14" width="52" height="10"/>
      <rect x="14" y="0" width="16" height="22"/>
      <circle cx="22" cy="48" r="9" fill="#fdecd6"/>
      <path d="M22 44 V48 L25 50" stroke="#5a3f2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Skyscrapers -->
    <g transform="translate(310, 30)">
      <rect x="0" y="60" width="40" height="158"/>
      <rect x="40" y="80" width="22" height="138"/>
      <rect x="62" y="40" width="34" height="178"/>
      <rect x="96" y="68" width="20" height="150"/>
    </g>
    <!-- Madroño tree (left of skyline) -->
    <g transform="translate(-90, 110)">
      <rect x="32" y="60" width="10" height="60" rx="2" fill="#5a3f2a"/>
      <g fill="#2a6f35">
        <circle cx="38" cy="40" r="26"/>
        <circle cx="60" cy="48" r="16"/>
        <circle cx="14" cy="48" r="16"/>
        <circle cx="50" cy="14" r="14"/>
        <circle cx="26" cy="18" r="14"/>
      </g>
      <g fill="#c8252b">
        <circle cx="22" cy="32" r="2.4"/>
        <circle cx="44" cy="40" r="2.4"/>
        <circle cx="56" cy="46" r="2.4"/>
        <circle cx="34" cy="54" r="2.4"/>
        <circle cx="48" cy="58" r="2.4"/>
      </g>
    </g>
  </g>

  <!-- Pavement + paw trail -->
  <rect x="0" y="556" width="1200" height="60" fill="#382617"/>
  <g fill="#ed731f" opacity="0.95">
    <g transform="translate(110, 588) rotate(-10)">
      <ellipse cx="0" cy="6" rx="11" ry="8"/>
      <ellipse cx="-12" cy="-7" rx="3.6" ry="4.6"/>
      <ellipse cx="-3.5" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="7" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="15" cy="-7" rx="3.6" ry="4.6"/>
    </g>
    <g transform="translate(220, 590) rotate(8)">
      <ellipse cx="0" cy="6" rx="11" ry="8"/>
      <ellipse cx="-12" cy="-7" rx="3.6" ry="4.6"/>
      <ellipse cx="-3.5" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="7" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="15" cy="-7" rx="3.6" ry="4.6"/>
    </g>
    <g transform="translate(330, 588) rotate(-10)">
      <ellipse cx="0" cy="6" rx="11" ry="8"/>
      <ellipse cx="-12" cy="-7" rx="3.6" ry="4.6"/>
      <ellipse cx="-3.5" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="7" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="15" cy="-7" rx="3.6" ry="4.6"/>
    </g>
    <g transform="translate(440, 590) rotate(8)">
      <ellipse cx="0" cy="6" rx="11" ry="8"/>
      <ellipse cx="-12" cy="-7" rx="3.6" ry="4.6"/>
      <ellipse cx="-3.5" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="7" cy="-12" rx="3.6" ry="4.6"/>
      <ellipse cx="15" cy="-7" rx="3.6" ry="4.6"/>
    </g>
  </g>

  <!-- Footer line -->
  <g transform="translate(72, 568)" font-family="DM Sans, system-ui, sans-serif">
    <text font-size="18" font-weight="700" letter-spacing="3" fill="#faf7f2">
      MADRONO-PERRUNO.VERCEL.APP · POR CELIAROZALENM · DATOS.MADRID.ES
    </text>
  </g>
</svg>
